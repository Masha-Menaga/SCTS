<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Job Portal</title>

<link rel="stylesheet" href="./CSS/style.css">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1e3c72">

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="./assets/Logo.jpg" class="logo">
    <h2>🌟 Where Passion Meets Excellence</h2>
    <p class="des">✨ Inspire • 📘 Educate • 🚀 Lead</p>
</div>

<!-- BUTTONS -->
<div class="action-buttons">
    <button class="btn seeker" onclick="goToSeeker()"> Job Seeker</button>
    <button class="btn giver" onclick="showPassword()"> Job Giver</button>
</div>

<!-- PASSWORD -->
<div id="passwordBox" class="password-box">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="checkPassword()" class="sub-button">Submit</button>
</div>

<!-- JOBS -->
<h3>📢 Current Openings</h3>
<div class="jobs-wrapper">
    <div id="jobs" class="jobs-container scroll"></div>
</div>

<script src="./JS/script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./JS/service-worker.js");
}
</script>

</body>
</html>
